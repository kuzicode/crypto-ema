<style>
    /* GMGN.ai PRO Dark Theme - Professional Crypto Trading Style */
    
    :root {
        /* 主色调 - 深黑色系 */
        --bg-color: #0d0d0d;
        --bg-secondary: #141414;
        --bg-tertiary: #1a1a1a;
        --bg-card: #1e1e1e;
        --bg-hover: #252525;
        
        /* 边框色 */
        --border-color: #2a2a2a;
        --border-light: #333333;
        
        /* 文字颜色 */
        --text-primary: #e5e5e5;
        --text-secondary: #9ca3af;
        --text-muted: #6b7280;
        
        /* 强调色 */
        --accent-color: #e5e5e5;
        --accent2-color: #9ca3af;
        
        /* 功能色 */
        --green-primary: #22c55e;
        --green-light: #4ade80;
        --red-primary: #ef4444;
        --red-light: #f87171;
        --yellow-primary: #eab308;
        
        /* 按钮色 */
        --button-bg: #262626;
        --button-hover: #333333;
        --button-active: #404040;
    }
    
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-primary);
        line-height: 1.6;
        padding: 10px;
        font-size: 14px;
        height: 100vh;
        overflow: hidden;
    }
    
    .container {
        max-width: 100%;
        height: calc(100vh - 20px);
        margin: 0 auto;
        display: flex;
        flex-direction: column;
    }
    
    /* 头部样式 */
    .header {
        text-align: left;
        margin-bottom: 10px;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 8px;
        position: relative;
    }
    
    /* 导航栏样式 */
    .nav-container {
        display: flex;
        align-items: center;
        margin-bottom: 0;
    }
    
    .brand {
        display: flex;
        align-items: center;
        margin-right: 30px;
    }
    
    .brand-logo {
        width: 30px;
        height: 30px;
        object-fit: contain;
        flex-shrink: 0;
        margin-right: 5px;
    }
    
    .brand-name {
        font-size: 22px;
        color: #FFFFFF;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        position: relative;
        padding: 0 5px;
    }
    
    .nav-menu {
        display: flex;
        align-items: center;
        gap: 20px;
    }
    
    .nav-item {
        color: var(--text-secondary);
        font-size: 16px;
        text-decoration: none;
        padding: 5px 10px;
        border-radius: 4px;
        transition: all 0.2s ease;
    }
    
    .nav-item:hover {
        color: var(--text-primary);
        background-color: var(--bg-hover);
    }
    
    .nav-item.active {
        color: var(--text-primary);
        background-color: var(--bg-tertiary);
        font-weight: 500;
    }
    
    .page-title {
        display: none;
    }
    
    /* 内容页面 */
    .page-content {
        display: none;
        width: 100%;
    }
    
    .page-content.active {
        display: flex;
        flex-direction: column;
        flex: 1;
        gap: 8px;
    }
    
    /* 收藏栏样式 - GMGN Style */
    .favorites-bar {
        background-color: var(--bg-secondary);
        border-bottom: 1px solid var(--border-color);
        padding: 4px 10px;
        flex-shrink: 0;
    }
    
    .favorites-list {
        display: flex;
        align-items: center;
        gap: 2px;
        overflow-x: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
    }
    
    .favorites-list::-webkit-scrollbar {
        display: none;
    }
    
    .favorite-btn {
        display: flex;
        align-items: center;
        gap: 4px;
        background-color: transparent;
        border: none;
        padding: 4px 8px;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.15s ease;
        white-space: nowrap;
        color: var(--text-secondary);
    }
    
    .favorite-btn:hover {
        background-color: var(--bg-hover);
        color: var(--text-primary);
    }
    
    .favorite-btn.active {
        background-color: var(--bg-tertiary);
        color: var(--text-primary);
    }
    
    .favorite-icon {
        font-size: 11px;
        width: 14px;
        text-align: center;
    }
    
    .favorite-name {
        font-size: 11px;
        font-weight: 500;
    }
    
    /* 指标页面主内容区 */
    .indicator-main {
        display: flex;
        flex: 1;
        gap: 10px;
        overflow: hidden;
    }
    
    /* Coming Soon 页面 */
    .coming-soon {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100%;
        width: 100%;
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 40px;
        color: var(--text-secondary);
    }
    
    .coming-soon h2 {
        font-size: 36px;
        margin-bottom: 20px;
        color: var(--text-primary);
    }
    
    .coming-soon p {
        font-size: 18px;
        text-align: center;
    }
    
    /* 主内容区布局 */
    .main-content {
        display: flex;
        flex: 1;
        gap: 10px;
        overflow: hidden;
    }
    
    /* 图表区域 */
    .chart-section {
        flex: 80;
        min-width: 0;
        overflow: hidden;
    }
    
    /* 控制区域 */
    .controls-section {
        flex: 20;
        min-width: 250px;
        max-width: 350px;
        overflow-y: auto;
        overflow-x: hidden;
    }
    
    /* 控制面板 */
    .control-panel {
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 12px;
        height: 100%;
        display: flex;
        flex-direction: column;
        width: 100%;
        box-sizing: border-box;
    }
    
    .panel-header {
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 8px;
        margin-bottom: 10px;
    }
    
    .panel-title {
        font-size: 15px;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        gap: 5px;
    }
    
    .status {
        color: var(--text-secondary);
        font-size: 12px;
        height: 15px;
        margin-top: 5px;
        font-weight: 500;
    }
    
    .status-container {
        text-align: center;
        margin: 15px 0 10px 0;
        min-height: 15px;
    }
    
    .error {
        color: var(--red-primary);
    }
    
    .panel-content {
        display: flex;
        flex-direction: column;
        gap: 12px;
        flex: 1;
    }
    
    /* 快速选择按钮 */
    .quick-symbols {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 5px;
    }
    
    .pixel-btn {
        background-color: var(--button-bg);
        color: var(--text-primary);
        border: 1px solid var(--border-light);
        padding: 4px 8px;
        margin-bottom: 4px;
        font-size: 12px;
        cursor: pointer;
        position: relative;
        border-radius: 4px;
        transition: all 0.2s ease;
    }
    
    .pixel-btn:hover {
        background-color: var(--button-hover);
        border-color: var(--text-muted);
    }
    
    .pixel-btn.active {
        background-color: var(--button-active);
        border-color: var(--green-primary);
        color: var(--green-primary);
    }
    
    /* 表单样式 */
    .form-group {
        margin-bottom: 15px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 5px;
        color: var(--text-secondary);
        font-size: 12px;
    }
    
    .form-group input, 
    .form-group select {
        width: 100%;
        padding: 6px 8px;
        background-color: var(--bg-secondary);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-size: 13px;
        transition: border-color 0.2s ease;
    }
    
    .form-group input:focus, 
    .form-group select:focus {
        outline: none;
        border-color: var(--text-muted);
    }
    
    /* 生成按钮 */
    .generate-btn {
        background-color: var(--green-primary);
        color: #000000;
        border: none;
        padding: 7px 14px;
        cursor: pointer;
        font-size: 13px;
        border-radius: 4px;
        transition: all 0.2s ease;
        text-transform: uppercase;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 5px;
        margin-top: auto;
        font-weight: 600;
    }
    
    .generate-btn:hover {
        background-color: var(--green-light);
    }
    
    /* 图表容器 */
    .chart-container {
        background-color: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 15px;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
    }
    
    #chart-image {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        border-radius: 4px;
    }
    
    /* 加载动画 */
    .loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: var(--text-secondary);
        text-align: center;
    }
    
    .loading .fa-spinner {
        font-size: 40px;
        margin-bottom: 10px;
        animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    
    /* 市场信息卡片 */
    .info-card {
        background-color: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        padding: 8px;
        font-size: 11px;
    }
    
    .info-card h3 {
        color: var(--text-primary);
        font-size: 14px;
        margin-bottom: 5px;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 5px;
    }
    
    .info-card .data-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 3px;
    }
    
    .info-card .data-row span:first-child {
        color: var(--text-secondary);
    }
    
    .info-card .data-value {
        color: var(--text-primary);
        font-weight: bold;
    }
    
    #market-info {
        display: none;
    }
    
    /* 页脚 */
    .footer {
        text-align: center;
        margin-top: 10px;
        font-size: 10px;
        color: var(--text-muted);
        border-top: 1px solid var(--border-color);
        padding-top: 10px;
    }
    
    /* CRT效果 - 禁用 */
    .crt-effect {
        display: none;
    }
    
    /* 提示框 */
    .tooltip {
        position: relative;
        display: inline-block;
    }
    
    .tooltip .tooltiptext {
        visibility: hidden;
        width: 120px;
        background-color: var(--bg-card);
        color: var(--text-primary);
        text-align: center;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        padding: 5px;
        position: absolute;
        z-index: 1;
        bottom: 125%;
        left: 50%;
        margin-left: -60px;
        opacity: 0;
        transition: opacity 0.2s ease;
        font-size: 10px;
    }
    
    .tooltip:hover .tooltiptext {
        visibility: visible;
        opacity: 1;
    }
    
    /* 发光动画 - 禁用，改为简单的过渡 */
    .glow {
        transition: color 0.2s ease;
    }
    
    /* 响应式设计 */
    @media (max-width: 768px) {
        body {
            overflow: auto;
            height: auto;
        }
        
        .container {
            height: auto;
            overflow: visible;
        }
        
        .main-content,
        .indicator-main {
            flex-direction: column-reverse;
            overflow: visible;
        }
        
        .chart-section {
            flex: initial;
            min-height: 400px;
        }
        
        .controls-section {
            flex: initial;
            max-width: 100%;
        }
        
        .favorites-bar {
            overflow-x: auto;
        }
        
        .favorite-btn {
            padding: 4px 8px;
        }
        
        .favorite-name {
            font-size: 12px;
        }
    }
    
    /* 添加操作建议的样式 */
    .advice-text {
        font-weight: bold;
        color: var(--yellow-primary);
    }
    
    /* 添加盘面趋势样式 */
    .market-trends-container {
        background-color: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        padding: 8px;
        margin: 10px 0;
    }
    
    .market-trends {
        font-size: 11px;
        margin-top: 5px;
    }
    
    .trend-category {
        margin-bottom: 4px;
    }
    
    .trend-title {
        font-weight: bold;
        color: var(--text-primary);
    }
    
    .trend-symbols {
        color: var(--text-secondary);
    }
    
    .trend-count {
        color: var(--yellow-primary);
    }
    
    .trend-dark-green {
        color: #16a34a;
    }
    
    .trend-light-green {
        color: #4ade80;
    }
    
    .trend-neutral {
        color: var(--text-secondary);
    }
    
    .trend-neutral-up {
        color: #86efac;
    }
    
    .trend-neutral-down {
        color: #fca5a5;
    }
    
    .trend-light-red {
        color: #f87171;
    }
    
    .trend-dark-red {
        color: #dc2626;
    }
    
    .loading-trends {
        font-style: italic;
        color: var(--text-secondary);
        text-align: center;
    }
    
    /* 添加刷新按钮样式 */
    .trends-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    .trends-header h3 {
        font-size: 14px;
        color: var(--text-primary);
        margin: 0;
        display: flex;
        align-items: center;
        gap: 5px;
    }
    
    .refresh-btn {
        background-color: var(--button-bg);
        color: var(--text-secondary);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        padding: 2px 6px;
        font-size: 10px;
        cursor: pointer;
        transition: all 0.2s ease;
    }
    
    .refresh-btn:hover {
        background-color: var(--button-hover);
        color: var(--text-primary);
    }
    
    .refresh-btn i {
        font-size: 10px;
    }
    
    .trend-message {
        text-align: center;
        color: var(--text-secondary);
        font-style: italic;
        font-size: 10px;
    }
    
    /* 加载中动画 */
    .refresh-btn.loading i {
        animation: spin 1s linear infinite;
    }
    
    /* 币价变动提醒页面样式 */
    .alert-section {
        flex: 1;
        min-width: 0;
        overflow: hidden;
    }
    
    .alert-container {
        background-color: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 15px;
        height: 100%;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
    }
    
    .alert-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 10px;
        margin-bottom: 15px;
    }
    
    .alert-title {
        color: var(--text-primary);
        font-size: 20px;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .alert-actions {
        display: flex;
        gap: 10px;
    }
    
    .alert-content {
        flex: 1;
        overflow-y: auto;
        position: relative;
    }
    
    .no-alerts {
        text-align: center;
        color: var(--text-secondary);
        font-style: italic;
        margin-top: 20px;
    }
    
    .alerts-list {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    
    .alert-item {
        background-color: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        padding: 12px;
        transition: all 0.2s ease;
    }
    
    .alert-item:hover {
        background-color: var(--bg-hover);
        border-color: var(--border-light);
    }
    
    .alert-time {
        color: var(--text-muted);
        font-size: 12px;
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    .alert-badge {
        background-color: var(--button-bg);
        color: var(--text-secondary);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: bold;
    }
    
    .latest-badge {
        background-color: var(--green-primary);
        color: #000000;
    }
    
    .alert-tokens {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    
    .token-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: var(--bg-card);
        padding: 8px 10px;
        border-radius: 4px;
        border-left: 3px solid;
    }
    
    .token-info {
        display: flex;
        gap: 10px;
        align-items: center;
    }
    
    .token-symbol {
        font-weight: bold;
        color: #FFFFFF;
        font-size: 14px;
    }
    
    .token-price {
        color: var(--text-secondary);
    }
    
    .token-ema {
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 11px;
    }
    
    /* EMA状态颜色 - 专业交易配色 */
    .ema-above-ma4 {
        color: #16a34a;
        border-left-color: #16a34a;
    }
    
    .ema-above-ma3 {
        color: #4ade80;
        border-left-color: #4ade80;
    }
    
    .ema-between-ma2-ma3 {
        color: #86efac;
        border-left-color: #86efac;
    }
    
    .ema-between-ma5-ma2 {
        color: #fca5a5;
        border-left-color: #fca5a5;
    }
    
    .ema-below-ma5 {
        color: #f87171;
        border-left-color: #f87171;
    }
    
    .ema-below-ma6 {
        color: #dc2626;
        border-left-color: #dc2626;
    }
    
    /* 状态变化高亮样式 */
    .status-changed {
        font-weight: bold;
        background-color: rgba(234, 179, 8, 0.15);
        padding: 4px 8px;
        border-radius: 4px;
        position: relative;
        animation: pulse 2s infinite;
    }
    
    .status-icon {
        font-size: 10px;
        margin-right: 4px;
        animation: spin 2s infinite linear;
        display: inline-block;
    }
    
    @keyframes pulse {
        0% {
            box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.3);
        }
        70% {
            box-shadow: 0 0 0 6px rgba(234, 179, 8, 0);
        }
        100% {
            box-shadow: 0 0 0 0 rgba(234, 179, 8, 0);
        }
    }
    
    /* 滚动条样式 - 专业深色主题 */
    ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
    }
    
    ::-webkit-scrollbar-track {
        background: var(--bg-secondary);
    }
    
    ::-webkit-scrollbar-thumb {
        background: var(--border-light);
        border-radius: 3px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted);
    }
</style>
