<!-- MA指标查询页面 -->
<div id="indicator-page" class="page-content">
    <!-- 收藏栏 - 主流币快捷选择 -->
    <div class="favorites-bar">
        <div class="favorites-list">
            <button type="button" class="favorite-btn" data-symbol="BTC">
                <span class="favorite-icon">₿</span>
                <span class="favorite-name">BTC</span>
            </button>
            <button type="button" class="favorite-btn" data-symbol="ETH">
                <span class="favorite-icon">Ξ</span>
                <span class="favorite-name">ETH</span>
            </button>
            <button type="button" class="favorite-btn" data-symbol="SOL">
                <span class="favorite-icon">◎</span>
                <span class="favorite-name">SOL</span>
            </button>
            <button type="button" class="favorite-btn" data-symbol="BNB">
                <span class="favorite-icon">⬡</span>
                <span class="favorite-name">BNB</span>
            </button>
            <button type="button" class="favorite-btn" data-symbol="XRP">
                <span class="favorite-icon">✕</span>
                <span class="favorite-name">XRP</span>
            </button>
            <button type="button" class="favorite-btn" data-symbol="DOGE">
                <span class="favorite-icon">Ð</span>
                <span class="favorite-name">DOGE</span>
            </button>
            <button type="button" class="favorite-btn" data-symbol="UNI">
                <span class="favorite-icon">🦄</span>
                <span class="favorite-name">UNI</span>
            </button>
            <button type="button" class="favorite-btn" data-symbol="AAVE">
                <span class="favorite-icon">👻</span>
                <span class="favorite-name">AAVE</span>
            </button>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="indicator-main">
        <!-- 图表区域 -->
        <div class="chart-section">
            <div class="chart-container">
                <img id="chart-image" style="display: none;">
                <div class="loading" id="loading" style="display: none;">
                    <i class="fas fa-spinner"></i>
                    <p class="glow">
                        加载数据中...
                    </p>
                </div>
                <div id="initial-message">
                    <p>
                        选择或搜索加密货币，然后点击生成图表按钮开始
                    </p>
                </div>
            </div>
        </div>
        
        <!-- 控制区域 -->
        <div class="controls-section">
            <div class="control-panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <i class="fas fa-sliders-h"></i>
                        控制面板
                    </div>
                </div>
                
                <form id="chart-form" class="panel-content">
                    <!-- 搜索框 -->
                    <div class="form-group">
                        <label for="symbol"><i class="fas fa-search"></i>
                            搜索币种 (仅支持已上线币安币种):
                        </label>
                        <input type="text" id="symbol" name="symbol" placeholder="BTC, ETH, SOL..." required>
                    </div>
                
                    <!-- 币种分析信息框 -->
                    <div id="coin-analysis" class="info-card" style="display: none;">
                        <h3>
                            币种分析
                        </h3>
                        <div class="data-row">
                            <span class="data-label">
                                当前价格
                            </span>
                            <span class="data-value" id="current-price">--</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">
                                <span class="ma-label" style="color: #22c55e;">强势线(MA4)</span>
                            </span>
                            <span class="data-value" id="ma4-price">--</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">
                                <span class="ma-label" style="color: #4ade80;">上涨线(MA3)</span>
                            </span>
                            <span class="data-value" id="ma3-price">--</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">
                                <span class="ma-label" style="color: #e5e5e5;">MA趋势线(MA2)</span>
                            </span>
                            <span class="data-value" id="ma2-price">--</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">
                                <span class="ma-label" style="color: #f87171;">下跌线(MA5)</span>
                            </span>
                            <span class="data-value" id="ma5-price">--</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">
                                <span class="ma-label" style="color: #ef4444;">超跌线(MA6)</span>
                            </span>
                            <span class="data-value" id="ma6-price">--</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">
                                市场趋势
                            </span>
                            <span class="data-value" id="market-trend">--</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">
                                MACD信号
                            </span>
                            <span class="data-value" id="macd-signal">--</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">
                                操作建议
                            </span>
                            <span class="data-value advice-text" id="trading-advice">--</span>
                        </div>
                    </div>
                    
                    <!-- 盘面趋势 -->
                    <div class="market-trends-container">
                        <div class="trends-header">
                            <h3>
                                <i class="fas fa-chart-line"></i>
                                主流币盘面趋势
                            </h3>
                            <button type="button" id="refresh-trends-btn" class="refresh-btn tooltip">
                                <i class="fas fa-sync-alt"></i>
                                <span class="tooltiptext">
                                    加载盘面趋势
                                </span>
                            </button>
                        </div>
                        <div id="market-trends" class="market-trends">
                            <div class="trend-message">
                                点击刷新按钮加载盘面趋势
                            </div>
                        </div>
                    </div>
                
                <!-- 将状态消息移动到生成按钮上方 -->
                <div class="status-container">
                    <div class="status" id="status"></div>
                </div>
                
                <button type="submit" id="generate-btn" class="generate-btn">
                    <i class="fas fa-rocket"></i>
                    生成图表
                </button>
            </form>
        </div>
    </div>
    </div>
</div>
