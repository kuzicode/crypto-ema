<script>
    document.addEventListener('DOMContentLoaded', () => {
        // 导航功能
        const pages = document.querySelectorAll('.page-content');
        const backHomeBtn = document.querySelector('.nav-back-home');
        const validPages = ['dashboard', 'indicator', 'ahr999', 'mvrv', 'price_alert'];

        function navigateTo(pageKey) {
            var targetPageId = pageKey + '-page';
            pages.forEach(page => {
                page.classList.toggle('active', page.id === targetPageId);
            });
            if (backHomeBtn) {
                backHomeBtn.style.display = (pageKey === 'dashboard') ? 'none' : 'flex';
            }
            window.location.hash = pageKey;
        }

        if (backHomeBtn) {
            backHomeBtn.addEventListener('click', function(e) {
                e.preventDefault();
                navigateTo('dashboard');
                if (typeof onPageNavigated === 'function') onPageNavigated('dashboard');
            });
        }

        // 根据 URL hash 初始化页面显示
        (function() {
            var hash = window.location.hash.replace('#', '');
            if (hash && hash !== 'dashboard' && validPages.indexOf(hash) !== -1) {
                navigateTo(hash);
            }
        })();
        
        // 元素引用
        const form = document.getElementById('chart-form');
        const chartImage = document.getElementById('chart-image');
        const loading = document.getElementById('loading');
        const status = document.getElementById('status');
        const initialMessage = document.getElementById('initial-message');
        const quickButtons = document.querySelectorAll('.pixel-btn');
        const favoriteButtons = document.querySelectorAll('.favorite-btn');
        const generateBtn = document.getElementById('generate-btn');
        const symbolInput = document.getElementById('symbol');
        
        // 新增获取盘面趋势元素
        const marketTrendsElement = document.getElementById('market-trends');
        const refreshTrendsBtn = document.getElementById('refresh-trends-btn');
        
        // 获取币种分析元素
        const coinAnalysis = document.getElementById('coin-analysis');
        
        // 存储状态
        const currentState = {
            symbol: 'BTC',
            lastFetchTime: 0,
            lastTrendsFetchTime: 0
        };
        
        // 本地存储key
        const STORAGE_KEY = 'cryptoAnalyzerPrefs';
        
        // 加载用户偏好
        const loadUserPreferences = () => {
            try {
                const savedPrefs = localStorage.getItem(STORAGE_KEY);
                if (savedPrefs) {
                    const prefs = JSON.parse(savedPrefs);
                    Object.assign(currentState, prefs);
                    
                    // 应用设置
                    symbolInput.value = currentState.symbol;
                    highlightActiveSymbol(currentState.symbol);
                }
            } catch (e) {
                console.error('无法加载偏好设置:', e);
            }
        };
        
        // 保存用户偏好
        const saveUserPreferences = () => {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(currentState));
            } catch (e) {
                console.error('无法保存偏好设置:', e);
            }
        };
        
        // 高亮活动币种
        const highlightActiveSymbol = (symbol) => {
            quickButtons.forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-symbol') === symbol);
            });
            favoriteButtons.forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-symbol') === symbol);
            });
        };
        
        // 防抖函数
        const debounce = (func, wait) => {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        };
        
        // 设置状态消息
        const setStatus = (message, isError = false) => {
            status.textContent = message;
            status.classList.toggle('error', isError);
        };
        
        // 获取图表数据
        const fetchChartData = () => {
            // 验证输入
            const symbolValue = symbolInput.value.trim();
            if (!symbolValue) {
                setStatus('请输入币种代码', true);
                return;
            }
            
            // 节流控制
            const now = Date.now();
            if (now - currentState.lastFetchTime < 2000) return;
            currentState.lastFetchTime = now;
            
            // 显示加载状态
            chartImage.style.display = 'none';
            initialMessage.style.display = 'none';
            loading.style.display = 'block';
            setStatus('获取数据中...');
            
            // 禁用按钮
            generateBtn.disabled = true;
            
            // 准备表单数据
            const formData = new FormData();
            formData.append('symbol', symbolValue);
            formData.append('interval', '4h'); // 使用固定的4小时周期
            
            // 发送请求
            fetch('/get_chart', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                return response.json();
            })
            .then(data => {
                loading.style.display = 'none';
                generateBtn.disabled = false;
                
                if (data.success) {
                    // 显示图表
                    chartImage.src = 'data:image/png;base64,' + data.image;
                    chartImage.style.display = 'block';
                    setStatus('图表生成成功！');
                    
                    // 更新币种分析信息
                    if (data.market_info) {
                        // 币价精度判断
                        let priceValue = data.market_info.price;
                        let priceNum = parseFloat(priceValue);
                        let priceDisplay = priceNum < 1 ? priceNum.toFixed(6) : priceNum.toFixed(2);
                        document.getElementById('current-price').textContent = priceDisplay + ' USDT';
                        
                        // MA线精度判断函数
                        function formatPrice(val) {
                            if (val < 0.0001) return val.toFixed(8);
                            if (val < 1) return val.toFixed(6);
                            return val.toFixed(2);
                        }
                        document.getElementById('ma2-price').textContent = formatPrice(data.market_info.ma2) + ' USDT';
                        document.getElementById('ma3-price').textContent = formatPrice(data.market_info.ma3) + ' USDT';
                        document.getElementById('ma4-price').textContent = formatPrice(data.market_info.ma4) + ' USDT';
                        document.getElementById('ma5-price').textContent = formatPrice(data.market_info.ma5) + ' USDT';
                        document.getElementById('ma6-price').textContent = formatPrice(data.market_info.ma6) + ' USDT';
                    }
                    
                    // 更新分析结果
                    if (data.analysis) {
                        document.getElementById('market-trend').textContent = data.analysis.trend;
                        document.getElementById('macd-signal').textContent = data.analysis.signal_type;
                        
                        // 添加操作建议
                        const adviceElement = document.getElementById('trading-advice');
                        adviceElement.textContent = data.analysis.trading_advice;
                        
                        // 根据建议内容设置颜色 - GMGN PRO Dark Theme
                        if (data.analysis.trading_advice.includes('买入') || 
                            data.analysis.trading_advice.includes('上涨')) {
                            adviceElement.style.color = '#22c55e'; // 绿色
                        } else if (data.analysis.trading_advice.includes('卖出') || 
                                  data.analysis.trading_advice.includes('下跌')) {
                            adviceElement.style.color = '#ef4444'; // 红色
                        } else if (data.analysis.trading_advice.includes('观望')) {
                            adviceElement.style.color = '#eab308'; // 黄色
                        } else if (data.analysis.trading_advice.includes('谨慎')) {
                            adviceElement.style.color = '#f97316'; // 橙色
                        }
                        
                        // 显示币种分析信息框
                        coinAnalysis.style.display = 'block';
                    }
                } else {
                    // 显示错误
                    chartImage.style.display = 'none';
                    initialMessage.style.display = 'block';
                    setStatus('错误：' + data.error, true);
                    coinAnalysis.style.display = 'none';
                }
            })
            .catch(error => {
                // 处理异常
                loading.style.display = 'none';
                chartImage.style.display = 'none';
                initialMessage.style.display = 'block';
                generateBtn.disabled = false;
                
                setStatus('错误：' + error.message, true);
                coinAnalysis.style.display = 'none';
            });
        };
        
        // 带防抖的查询函数
        const debouncedFetchData = debounce(fetchChartData, 300);
        
        // 事件监听器
        
        // 快速选择按钮（右侧面板 - 已移除，保留兼容性）
        quickButtons.forEach(button => {
            button.addEventListener('click', function() {
                const symbol = this.getAttribute('data-symbol');
                symbolInput.value = symbol;
                currentState.symbol = symbol;
                highlightActiveSymbol(symbol);
                saveUserPreferences();
                fetchChartData();
            });
        });
        
        // 收藏栏按钮
        favoriteButtons.forEach(button => {
            button.addEventListener('click', function() {
                const symbol = this.getAttribute('data-symbol');
                symbolInput.value = symbol;
                currentState.symbol = symbol;
                highlightActiveSymbol(symbol);
                saveUserPreferences();
                fetchChartData();
            });
        });
        
        // 表单提交
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            currentState.symbol = symbolInput.value;
            saveUserPreferences();
            highlightActiveSymbol(currentState.symbol);
            debouncedFetchData();
        });
        
        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.activeElement === symbolInput) {
                e.preventDefault();
                form.dispatchEvent(new Event('submit'));
            }
        });
        
        // 获取所有币种的盘面趋势
        const fetchMarketTrends = () => {
            // 节流控制
            const now = Date.now();
            if (now - currentState.lastTrendsFetchTime < 5000) {
                setStatus('请稍等再刷新趋势', true);
                return;
            }
            currentState.lastTrendsFetchTime = now;
            
            // 显示加载中状态
            refreshTrendsBtn.classList.add('loading');
            refreshTrendsBtn.disabled = true;
            
            // 显示加载中
            marketTrendsElement.innerHTML = `
                <div class="loading-trends">
                    加载趋势中...
                </div>
            `;
            
            // 获取所有收藏栏币种
            const symbolButtons = document.querySelectorAll('.favorite-btn');
            const symbols = Array.from(symbolButtons).map(btn => btn.getAttribute('data-symbol'));
            
            // 发送请求
            fetch('/get_market_trends', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    symbols: symbols,
                    interval: '4h' // 固定使用4小时周期
                })
            })
            .then(response => {
                if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                return response.json();
            })
            .then(data => {
                // 恢复按钮状态
                refreshTrendsBtn.classList.remove('loading');
                refreshTrendsBtn.disabled = false;
                
                if (data.success) {
                    displayMarketTrends(data.trends);
                    setStatus('盘面趋势已更新');
                } else {
                    marketTrendsElement.innerHTML = `
                        <div class="error">
                            获取趋势失败
                        </div>
                    `;
                    setStatus('更新趋势失败', true);
                }
            })
            .catch(error => {
                console.error('获取盘面趋势出错:', error);
                refreshTrendsBtn.classList.remove('loading');
                refreshTrendsBtn.disabled = false;
                
                marketTrendsElement.innerHTML = `
                    <div class="error">
                        获取趋势失败
                    </div>
                `;
                setStatus('更新趋势失败', true);
            });
        };
        
        // 显示盘面趋势
        const displayMarketTrends = (trends) => {
            const trendsHtml = `
                <div class="trend-category">
                    <span class="trend-title trend-dark-green">
                        突破强势线
                        <span class="trend-count">(${trends.above_ma4.length})</span>:
                    </span>
                    <span class="trend-symbols">${trends.above_ma4.join(', ') || '无'}</span>
                </div>
                <div class="trend-category">
                    <span class="trend-title trend-light-green">
                        突破上涨线
                        <span class="trend-count">(${trends.above_ma3.length})</span>:
                    </span>
                    <span class="trend-symbols">${trends.above_ma3.join(', ') || '无'}</span>
                </div>
                <div class="trend-category">
                    <span class="trend-title trend-neutral-up">
                        盘整区上行
                        <span class="trend-count">(${trends.between_ma2_ma3.length})</span>:
                    </span>
                    <span class="trend-symbols">${trends.between_ma2_ma3.join(', ') || '无'}</span>
                </div>
                <div class="trend-category">
                    <span class="trend-title trend-neutral-down">
                        盘整区下行
                        <span class="trend-count">(${trends.between_ma5_ma2.length})</span>:
                    </span>
                    <span class="trend-symbols">${trends.between_ma5_ma2.join(', ') || '无'}</span>
                </div>
                <div class="trend-category">
                    <span class="trend-title trend-light-red">
                        跌破下跌线
                        <span class="trend-count">(${trends.below_ma5.length})</span>:
                    </span>
                    <span class="trend-symbols">${trends.below_ma5.join(', ') || '无'}</span>
                </div>
                <div class="trend-category">
                    <span class="trend-title trend-dark-red">
                        跌破超跌线
                        <span class="trend-count">(${trends.below_ma6.length})</span>:
                    </span>
                    <span class="trend-symbols">${trends.below_ma6.join(', ') || '无'}</span>
                </div>
            `;
            
            marketTrendsElement.innerHTML = trendsHtml;
        };
        
        // 初始化
        loadUserPreferences();
        
        // 添加刷新盘面趋势按钮的事件监听器
        refreshTrendsBtn.addEventListener('click', fetchMarketTrends);
        
        // 币价变动提醒相关功能
        const alertLoading = document.getElementById('alert-loading');
        const noAlerts = document.getElementById('no-alerts');
        const alertsList = document.getElementById('alerts-list');
        const refreshAlertsBtn = document.getElementById('refresh-alerts-btn');
        
        // 获取币价提醒记录
        const fetchPriceAlerts = () => {
            // 显示加载状态
            alertLoading.style.display = 'block';
            noAlerts.style.display = 'none';
            alertsList.style.display = 'none';
            
            // 添加加载动画
            refreshAlertsBtn.classList.add('loading');
            refreshAlertsBtn.disabled = true;
            
            // 获取提醒记录
            fetch('/get_price_alerts')
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    // 隐藏加载状态
                    alertLoading.style.display = 'none';
                    refreshAlertsBtn.classList.remove('loading');
                    refreshAlertsBtn.disabled = false;
                    
                    if (data.success) {
                        if (data.alerts && data.alerts.length > 0) {
                            displayPriceAlerts(data.alerts);
                            alertsList.style.display = 'flex';
                        } else {
                            noAlerts.style.display = 'block';
                        }
                    } else {
                        noAlerts.style.display = 'block';
                        noAlerts.innerHTML = `<p class="error">加载提醒记录失败: ${data.error || '未知错误'}</p>`;
                    }
                })
                .catch(error => {
                    alertLoading.style.display = 'none';
                    noAlerts.style.display = 'block';
                    noAlerts.innerHTML = `<p class="error">加载提醒记录失败: ${error.message}</p>`;
                    refreshAlertsBtn.classList.remove('loading');
                    refreshAlertsBtn.disabled = false;
                });
        };
        
        // 显示币价提醒记录
        const displayPriceAlerts = (alerts) => {
            // 先按时间降序排序（最新的在前面）
            const sortedAlerts = [...alerts].sort((a, b) => {
                return new Date(b.timestamp) - new Date(a.timestamp);
            });
            
            // 生成HTML
            let html = '';
            
            // 跟踪前一条记录的EMA状态，用于比较变化
            let prevEmaStatus = {};
            
            // 如果有多于一条记录，获取第二条记录的EMA状态（因为排序后，索引1是时间上的前一条）
            if (sortedAlerts.length > 1 && sortedAlerts[1].data) {
                sortedAlerts[1].data.forEach(token => {
                    prevEmaStatus[token.Token] = token.EMA;
                });
            }
            
            sortedAlerts.forEach((alert, alertIndex) => {
                // 格式化时间
                const date = new Date(alert.timestamp);
                const formattedDate = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}:${String(date.getSeconds()).padStart(2, '0')}`;
                
                // 创建提醒项HTML
                html += `
                    <div class="alert-item">
                        <div class="alert-time">
                            <span>${formattedDate}</span>
                            <span class="alert-badge ${alertIndex === 0 ? 'latest-badge' : ''}">
                                ${alertIndex === 0 ? '<i class="fas fa-bell"></i> 最新' : 'EMA状态变化'}
                            </span>
                        </div>
                        <div class="alert-tokens">
                `;
                
                // 添加各个代币信息
                if (alert.data && alert.data.length > 0) {
                    alert.data.forEach(token => {
                        // 获取EMA状态的CSS类
                        let emaClass = 'ema-between-ma5-ma2'; // 默认类
                        
                        // 根据EMA状态设置相应的CSS类（支持带emoji和不带emoji的格式）
                        if (token.EMA.includes('突破强势线') || token.EMA_Key === 'above_ma4') {
                            emaClass = 'ema-above-ma4';
                        } else if (token.EMA.includes('突破上涨线') || token.EMA_Key === 'above_ma3') {
                            emaClass = 'ema-above-ma3';
                        } else if (token.EMA.includes('盘整区上行') || token.EMA_Key === 'between_ma2_ma3') {
                            emaClass = 'ema-between-ma2-ma3';
                        } else if (token.EMA.includes('盘整区下行') || token.EMA_Key === 'between_ma5_ma2') {
                            emaClass = 'ema-between-ma5-ma2';
                        } else if (token.EMA.includes('跌破下跌线') || token.EMA_Key === 'below_ma5') {
                            emaClass = 'ema-below-ma5';
                        } else if (token.EMA.includes('跌破超跌线') || token.EMA_Key === 'below_ma6') {
                            emaClass = 'ema-below-ma6';
                        }
                        
                        // 检查是否为最新记录，且EMA状态发生变化
                        let statusChanged = false;
                        let statusChangeText = '';
                        
                        if (alertIndex === 0 && prevEmaStatus[token.Token] && prevEmaStatus[token.Token] !== token.EMA) {
                            statusChanged = true;
                            statusChangeText = `<i class="fas fa-exchange-alt status-icon"></i> ${prevEmaStatus[token.Token]} → ${token.EMA}`;
                        }
                        
                        html += `
                            <div class="token-card ${emaClass}">
                                <div class="token-info">
                                    <span class="token-symbol">${token.Token}</span>
                                    <span class="token-price">${token.Price} USDT</span>
                                </div>
                                <div class="token-ema ${emaClass} ${statusChanged ? 'status-changed' : ''}">
                                    ${statusChanged ? statusChangeText : token.EMA}
                                </div>
                            </div>
                        `;
                    });
                } else {
                    html += `<div class="no-tokens">无代币数据</div>`;
                }
                
                html += `
                        </div>
                    </div>
                `;
            });
            
            // 更新DOM
            alertsList.innerHTML = html;
        };
        
        // 添加刷新提醒记录按钮的事件监听器
        if (refreshAlertsBtn) {
            refreshAlertsBtn.addEventListener('click', fetchPriceAlerts);
        }
        
        // 首次加载时自动生成图表
        setTimeout(() => {
            if (!symbolInput.value) {
                symbolInput.value = currentState.symbol || 'BTC';
            }
            highlightActiveSymbol(symbolInput.value);
            debouncedFetchData();
            // 页面加载时自动获取盘面趋势
            fetchMarketTrends();
            
            // 如果在币价提醒页面，自动加载提醒记录
            if (window.location.hash === '#price_alert' && refreshAlertsBtn) {
                fetchPriceAlerts();
            }
        }, 500);
        
        // 页面切换后自动加载对应数据
        function onPageNavigated(page) {
            if (page === 'dashboard') {
                setTimeout(function() {
                    if (!dashboardState.loaded) fetchDashboard();
                }, 100);
            }
            if (page === 'price_alert' && refreshAlertsBtn) {
                setTimeout(function() {
                    fetchPriceAlerts();
                }, 100);
            }
            if (page === 'ahr999') {
                setTimeout(function() {
                    if (typeof ahr999State !== 'undefined' && !ahr999State.loaded) fetchAhr999Data();
                    else if (typeof resizeAhr999Chart === 'function') resizeAhr999Chart();
                }, 100);
            }
            if (page === 'mvrv') {
                setTimeout(function() {
                    if (typeof mvrvState !== 'undefined' && !mvrvState.loaded) fetchMvrvData();
                    else if (typeof resizeMvrvChart === 'function') resizeMvrvChart();
                }, 100);
            }
        }

        // ==================== Dashboard 主页功能 ====================

        const dashboardState = { loaded: false, lastFetchTime: 0 };
        const dashLoading = document.getElementById('dashboard-loading');

        function getAhr999StatusColor(val) {
            if (val < 0.45) return '#22c55e';
            if (val <= 1.2) return '#eab308';
            return '#ef4444';
        }

        function getMvrvStatusColor(val) {
            if (val < 1.0) return '#22c55e';
            if (val <= 3.0) return '#eab308';
            return '#ef4444';
        }

        function updateDashboardCards(data) {
            var timeEl = document.getElementById('dashboard-update-time');
            if (timeEl) {
                var now = new Date();
                timeEl.textContent = '数据更新：' + now.getFullYear() + '-' +
                    String(now.getMonth() + 1).padStart(2, '0') + '-' +
                    String(now.getDate()).padStart(2, '0') + ' ' +
                    String(now.getHours()).padStart(2, '0') + ':' +
                    String(now.getMinutes()).padStart(2, '0');
            }

            if (data.ahr999) {
                var aVal = document.getElementById('dash-ahr999-value');
                var aDot = document.getElementById('dash-ahr999-dot');
                var aStatus = document.getElementById('dash-ahr999-status');
                var color = getAhr999StatusColor(data.ahr999.ahr999);
                aVal.textContent = data.ahr999.ahr999.toFixed(2);
                aVal.classList.remove('skeleton');
                aVal.style.color = color;
                aDot.style.background = color;
                aStatus.textContent = data.ahr999.suggestion;
                aStatus.style.color = color;
            }

            if (data.mvrv) {
                var mVal = document.getElementById('dash-mvrv-value');
                var mDot = document.getElementById('dash-mvrv-dot');
                var mStatus = document.getElementById('dash-mvrv-status');
                var mColor = getMvrvStatusColor(data.mvrv.mvrv);
                mVal.textContent = data.mvrv.mvrv.toFixed(2);
                mVal.classList.remove('skeleton');
                mVal.style.color = mColor;
                mDot.style.background = mColor;
                mStatus.textContent = data.mvrv.status;
                mStatus.style.color = mColor;
            }
        }

        function fetchDashboard() {
            var now = Date.now();
            if (now - dashboardState.lastFetchTime < 5000) return;
            dashboardState.lastFetchTime = now;

            // 骨架屏
            var skeletonEls = document.querySelectorAll('.dash-card-value');
            skeletonEls.forEach(function(el) {
                if (el.textContent === '—') el.classList.add('skeleton');
            });

            if (dashLoading) dashLoading.style.display = 'block';

            fetch('/get_dashboard')
                .then(function(resp) {
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    return resp.json();
                })
                .then(function(data) {
                    if (dashLoading) dashLoading.style.display = 'none';
                    if (data.success) {
                        updateDashboardCards(data);
                        dashboardState.loaded = true;
                    }
                })
                .catch(function(err) {
                    if (dashLoading) dashLoading.style.display = 'none';
                    console.error('Dashboard 数据获取失败:', err);
                });
        }

        // Dashboard 卡片点击 -> 跳转到对应子页面
        document.querySelectorAll('.dashboard-card[data-target]').forEach(function(card) {
            card.addEventListener('click', function() {
                var target = this.getAttribute('data-target');
                navigateTo(target);
                onPageNavigated(target);
            });
        });

        // 根据当前页面加载对应数据
        (function() {
            var hash = window.location.hash.replace('#', '');
            var currentPage = (hash && hash !== 'dashboard' && validPages.indexOf(hash) !== -1) ? hash : 'dashboard';
            if (currentPage === 'dashboard') {
                setTimeout(fetchDashboard, 300);
            } else {
                setTimeout(function() { onPageNavigated(currentPage); }, 300);
            }
        })();

        // ==================== AHR999 指标功能 ====================

        const ahr999State = {
            loaded: false,
            chart: null,
            ahr999Series: null,
            priceSeries: null,
            costSeries: null,
            fittedSeries: null,
            hline045: null,
            hline120: null,
            ahr999Visible: true,
            priceVisible: true,
            costVisible: false,
            fittedVisible: false,
            lastFetchTime: 0
        };

        const refreshAhr999Btn = document.getElementById('refresh-ahr999-btn');
        const ahr999ChartEl = document.getElementById('ahr999-chart');
        const ahr999Loading = document.getElementById('ahr999-loading');
        const ahr999Tooltip = document.getElementById('ahr999-tooltip');

        function getAhr999Color(val) {
            if (val < 0.45) return '#22c55e';
            if (val <= 1.2) return '#eab308';
            return '#ef4444';
        }

        function initAhr999Chart() {
            if (ahr999State.chart) return;
            if (!ahr999ChartEl || ahr999ChartEl.offsetWidth === 0) return;

            const chart = LightweightCharts.createChart(ahr999ChartEl, {
                width: ahr999ChartEl.offsetWidth,
                height: ahr999ChartEl.offsetHeight || 350,
                layout: {
                    background: { color: '#1e1e1e' },
                    textColor: '#9ca3af'
                },
                grid: {
                    vertLines: { color: '#2a2a2a' },
                    horzLines: { color: '#2a2a2a' }
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal
                },
                rightPriceScale: {
                    borderColor: '#2a2a2a',
                    visible: true
                },
                leftPriceScale: {
                    borderColor: '#2a2a2a',
                    visible: true
                },
                timeScale: {
                    borderColor: '#2a2a2a',
                    timeVisible: false
                },
                handleScroll: true,
                handleScale: true
            });

            const ahr999Series = chart.addLineSeries({
                color: '#3b82f6',
                lineWidth: 2,
                title: 'AHR999',
                priceScaleId: 'right',
                lastValueVisible: true,
                priceLineVisible: false
            });

            const priceSeries = chart.addLineSeries({
                color: '#e5e5e5',
                lineWidth: 1,
                title: 'BTC价格',
                priceScaleId: 'left',
                lastValueVisible: true,
                priceLineVisible: false
            });

            const costSeries = chart.addLineSeries({
                color: '#a855f7',
                lineWidth: 1,
                title: '200日成本',
                priceScaleId: 'left',
                lastValueVisible: false,
                priceLineVisible: false,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                visible: false
            });

            const fittedSeries = chart.addLineSeries({
                color: '#38bdf8',
                lineWidth: 1,
                title: '拟合价格',
                priceScaleId: 'left',
                lastValueVisible: false,
                priceLineVisible: false,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                visible: false
            });

            const hline045 = chart.addLineSeries({
                color: 'rgba(34,197,94,0.4)',
                lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                priceScaleId: 'right',
                lastValueVisible: true,
                priceLineVisible: false,
                crosshairMarkerVisible: false,
                title: '0.45'
            });

            const hline120 = chart.addLineSeries({
                color: 'rgba(239,68,68,0.4)',
                lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                priceScaleId: 'right',
                lastValueVisible: true,
                priceLineVisible: false,
                crosshairMarkerVisible: false,
                title: '1.2'
            });

            ahr999State.hline045 = hline045;
            ahr999State.hline120 = hline120;

            chart.subscribeCrosshairMove(function(param) {
                if (!param || !param.time || !param.seriesData || param.seriesData.size === 0) {
                    ahr999Tooltip.style.display = 'none';
                    return;
                }

                const ahr999Val = ahr999State.ahr999Visible ? param.seriesData.get(ahr999Series) : null;
                const priceVal = ahr999State.priceVisible ? param.seriesData.get(priceSeries) : null;
                const costVal = ahr999State.costVisible ? param.seriesData.get(costSeries) : null;
                const fittedVal = ahr999State.fittedVisible ? param.seriesData.get(fittedSeries) : null;

                if (!ahr999Val && !priceVal && !costVal && !fittedVal) {
                    ahr999Tooltip.style.display = 'none';
                    return;
                }

                const dateStr = param.time;
                let html = `<div style="margin-bottom:4px;color:#6b7280">${dateStr}</div>`;
                if (ahr999Val) {
                    const color = getAhr999Color(ahr999Val.value);
                    html += `<div>AHR999: <span style="color:${color};font-weight:bold">${ahr999Val.value.toFixed(4)}</span></div>`;
                }
                if (priceVal) html += `<div>BTC: <span style="color:#e5e5e5">$${priceVal.value.toLocaleString()}</span></div>`;
                if (costVal) html += `<div>200d: <span style="color:#a855f7">$${costVal.value.toLocaleString()}</span></div>`;
                if (fittedVal) html += `<div>拟合: <span style="color:#38bdf8">$${fittedVal.value.toLocaleString()}</span></div>`;

                ahr999Tooltip.innerHTML = html;
                ahr999Tooltip.style.display = 'block';
            });

            ahr999State.chart = chart;
            ahr999State.ahr999Series = ahr999Series;
            ahr999State.priceSeries = priceSeries;
            ahr999State.costSeries = costSeries;
            ahr999State.fittedSeries = fittedSeries;

            var toggleAhr999Btn = document.getElementById('toggle-ahr999-btn');
            var togglePriceBtn = document.getElementById('toggle-price-btn');
            var toggleCostBtn = document.getElementById('toggle-cost-btn');
            var toggleFittedBtn = document.getElementById('toggle-fitted-btn');

            if (toggleAhr999Btn) {
                toggleAhr999Btn.addEventListener('click', function() {
                    ahr999State.ahr999Visible = !ahr999State.ahr999Visible;
                    this.setAttribute('data-active', ahr999State.ahr999Visible);
                    ahr999Series.applyOptions({ visible: ahr999State.ahr999Visible });
                });
            }

            if (togglePriceBtn) {
                togglePriceBtn.addEventListener('click', function() {
                    ahr999State.priceVisible = !ahr999State.priceVisible;
                    this.setAttribute('data-active', ahr999State.priceVisible);
                    priceSeries.applyOptions({ visible: ahr999State.priceVisible });
                });
            }

            if (toggleCostBtn) {
                toggleCostBtn.addEventListener('click', function() {
                    ahr999State.costVisible = !ahr999State.costVisible;
                    this.setAttribute('data-active', ahr999State.costVisible);
                    costSeries.applyOptions({ visible: ahr999State.costVisible });
                });
            }

            if (toggleFittedBtn) {
                toggleFittedBtn.addEventListener('click', function() {
                    ahr999State.fittedVisible = !ahr999State.fittedVisible;
                    this.setAttribute('data-active', ahr999State.fittedVisible);
                    fittedSeries.applyOptions({ visible: ahr999State.fittedVisible });
                });
            }
        }

        function resizeAhr999Chart() {
            if (ahr999State.chart && ahr999ChartEl) {
                ahr999State.chart.applyOptions({
                    width: ahr999ChartEl.offsetWidth,
                    height: ahr999ChartEl.offsetHeight || 350
                });
            }
        }

        function updateAhr999Cards(current) {
            const valueEl = document.getElementById('ahr999-value');
            const zoneEl = document.getElementById('ahr999-zone');
            const priceEl = document.getElementById('ahr999-price');
            const costEl = document.getElementById('ahr999-cost');
            const fittedEl = document.getElementById('ahr999-fitted');
            const suggEl = document.getElementById('ahr999-suggestion');

            const color = getAhr999Color(current.ahr999);

            valueEl.textContent = current.ahr999.toFixed(4);
            valueEl.style.color = color;
            zoneEl.textContent = current.suggestion;
            zoneEl.style.color = color;

            priceEl.textContent = '$' + current.price.toLocaleString();
            costEl.textContent = '$' + current.cost_200d.toLocaleString();
            fittedEl.textContent = '$' + current.fitted_price.toLocaleString();

            suggEl.textContent = current.suggestion;
            suggEl.style.color = color;
        }

        function updateAhr999Chart(history) {
            if (!ahr999State.chart) return;

            const ahr999Data = [];
            const priceData = [];
            const costData = [];
            const fittedData = [];

            history.forEach(item => {
                const time = item.date;
                ahr999Data.push({ time, value: item.ahr999 });
                priceData.push({ time, value: item.price });
                costData.push({ time, value: item.cost_200d });
                fittedData.push({ time, value: item.fitted_price });
            });

            ahr999State.ahr999Series.setData(ahr999Data);
            ahr999State.priceSeries.setData(priceData);
            ahr999State.costSeries.setData(costData);
            ahr999State.fittedSeries.setData(fittedData);

            if (history.length >= 2) {
                var firstTime = history[0].date;
                var lastTime = history[history.length - 1].date;
                ahr999State.hline045.setData([
                    { time: firstTime, value: 0.45 },
                    { time: lastTime, value: 0.45 }
                ]);
                ahr999State.hline120.setData([
                    { time: firstTime, value: 1.2 },
                    { time: lastTime, value: 1.2 }
                ]);
            }

            ahr999State.chart.timeScale().fitContent();
        }

        function fetchAhr999Data() {
            const now = Date.now();
            if (now - ahr999State.lastFetchTime < 5000) return;
            ahr999State.lastFetchTime = now;

            ahr999Loading.style.display = 'block';
            if (refreshAhr999Btn) {
                refreshAhr999Btn.classList.add('loading');
                refreshAhr999Btn.disabled = true;
            }

            fetch('/get_ahr999')
                .then(response => {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.json();
                })
                .then(data => {
                    ahr999Loading.style.display = 'none';
                    if (refreshAhr999Btn) {
                        refreshAhr999Btn.classList.remove('loading');
                        refreshAhr999Btn.disabled = false;
                    }

                    if (data.success) {
                        updateAhr999Cards(data.current);
                        initAhr999Chart();
                        updateAhr999Chart(data.history);
                        ahr999State.loaded = true;
                    } else {
                        console.error('AHR999 数据获取失败:', data.error);
                    }
                })
                .catch(error => {
                    ahr999Loading.style.display = 'none';
                    if (refreshAhr999Btn) {
                        refreshAhr999Btn.classList.remove('loading');
                        refreshAhr999Btn.disabled = false;
                    }
                    console.error('AHR999 请求出错:', error);
                });
        }

        if (refreshAhr999Btn) {
            refreshAhr999Btn.addEventListener('click', function() {
                ahr999State.lastFetchTime = 0;
                fetchAhr999Data();
            });
        }

        window.addEventListener('resize', debounce(resizeAhr999Chart, 200));

        if (window.location.hash === '#ahr999') {
            setTimeout(fetchAhr999Data, 600);
        }

        // ==================== MVRV 指标功能 ====================

        const mvrvState = {
            loaded: false,
            chart: null,
            mvrvSeries: null,
            priceSeries: null,
            hline1: null,
            hline3: null,
            mvrvVisible: true,
            priceVisible: true,
            lastFetchTime: 0
        };

        const refreshMvrvBtn = document.getElementById('refresh-mvrv-btn');
        const mvrvChartEl = document.getElementById('mvrv-chart');
        const mvrvLoading = document.getElementById('mvrv-loading');
        const mvrvTooltip = document.getElementById('mvrv-tooltip');

        function getMvrvColor(val) {
            if (val < 1.0) return '#22c55e';
            if (val <= 3.0) return '#eab308';
            return '#ef4444';
        }

        function initMvrvChart() {
            if (mvrvState.chart) return;
            if (!mvrvChartEl || mvrvChartEl.offsetWidth === 0) return;

            const chart = LightweightCharts.createChart(mvrvChartEl, {
                width: mvrvChartEl.offsetWidth,
                height: mvrvChartEl.offsetHeight || 350,
                layout: {
                    background: { color: '#1e1e1e' },
                    textColor: '#9ca3af'
                },
                grid: {
                    vertLines: { color: '#2a2a2a' },
                    horzLines: { color: '#2a2a2a' }
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal
                },
                rightPriceScale: {
                    borderColor: '#2a2a2a',
                    visible: true
                },
                leftPriceScale: {
                    borderColor: '#2a2a2a',
                    visible: true
                },
                timeScale: {
                    borderColor: '#2a2a2a',
                    timeVisible: false
                },
                handleScroll: true,
                handleScale: true
            });

            const mvrvSeries = chart.addLineSeries({
                color: '#3b82f6',
                lineWidth: 2,
                title: 'MVRV',
                priceScaleId: 'right',
                lastValueVisible: true,
                priceLineVisible: false
            });

            const priceSeries = chart.addLineSeries({
                color: '#e5e5e5',
                lineWidth: 1,
                title: 'BTC价格',
                priceScaleId: 'left',
                lastValueVisible: true,
                priceLineVisible: false
            });

            const hline1 = chart.addLineSeries({
                color: 'rgba(34,197,94,0.4)',
                lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                priceScaleId: 'right',
                lastValueVisible: true,
                priceLineVisible: false,
                crosshairMarkerVisible: false,
                title: '1.0'
            });

            const hline3 = chart.addLineSeries({
                color: 'rgba(239,68,68,0.4)',
                lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                priceScaleId: 'right',
                lastValueVisible: true,
                priceLineVisible: false,
                crosshairMarkerVisible: false,
                title: '3.0'
            });

            mvrvState.hline1 = hline1;
            mvrvState.hline3 = hline3;

            chart.subscribeCrosshairMove(function(param) {
                if (!param || !param.time || !param.seriesData || param.seriesData.size === 0) {
                    mvrvTooltip.style.display = 'none';
                    return;
                }

                const mvrvVal = mvrvState.mvrvVisible ? param.seriesData.get(mvrvSeries) : null;
                const priceVal = mvrvState.priceVisible ? param.seriesData.get(priceSeries) : null;

                if (!mvrvVal && !priceVal) {
                    mvrvTooltip.style.display = 'none';
                    return;
                }

                const dateStr = param.time;
                let html = '<div style="margin-bottom:4px;color:#6b7280">' + dateStr + '</div>';
                if (mvrvVal) {
                    const color = getMvrvColor(mvrvVal.value);
                    html += '<div>MVRV: <span style="color:' + color + ';font-weight:bold">' + mvrvVal.value.toFixed(4) + '</span></div>';
                }
                if (priceVal) html += '<div>BTC: <span style="color:#e5e5e5">$' + priceVal.value.toLocaleString() + '</span></div>';

                mvrvTooltip.innerHTML = html;
                mvrvTooltip.style.display = 'block';
            });

            mvrvState.chart = chart;
            mvrvState.mvrvSeries = mvrvSeries;
            mvrvState.priceSeries = priceSeries;

            var toggleMvrvBtn = document.getElementById('toggle-mvrv-btn');
            var toggleMvrvPriceBtn = document.getElementById('toggle-mvrv-price-btn');

            if (toggleMvrvBtn) {
                toggleMvrvBtn.addEventListener('click', function() {
                    mvrvState.mvrvVisible = !mvrvState.mvrvVisible;
                    this.setAttribute('data-active', mvrvState.mvrvVisible);
                    mvrvSeries.applyOptions({ visible: mvrvState.mvrvVisible });
                });
            }

            if (toggleMvrvPriceBtn) {
                toggleMvrvPriceBtn.addEventListener('click', function() {
                    mvrvState.priceVisible = !mvrvState.priceVisible;
                    this.setAttribute('data-active', mvrvState.priceVisible);
                    priceSeries.applyOptions({ visible: mvrvState.priceVisible });
                });
            }
        }

        function resizeMvrvChart() {
            if (mvrvState.chart && mvrvChartEl) {
                mvrvState.chart.applyOptions({
                    width: mvrvChartEl.offsetWidth,
                    height: mvrvChartEl.offsetHeight || 350
                });
            }
        }

        function updateMvrvCards(current) {
            const valueEl = document.getElementById('mvrv-value');
            const zoneEl = document.getElementById('mvrv-zone');
            const statusEl = document.getElementById('mvrv-status');
            const percentileEl = document.getElementById('mvrv-percentile');
            const priceEl = document.getElementById('mvrv-price');

            const color = getMvrvColor(current.mvrv);

            valueEl.textContent = current.mvrv.toFixed(4);
            valueEl.style.color = color;
            zoneEl.textContent = current.status;
            zoneEl.style.color = color;

            statusEl.textContent = current.status;
            statusEl.style.color = color;

            percentileEl.textContent = current.percentile + '%';

            priceEl.textContent = '$' + current.price.toLocaleString();
        }

        function updateMvrvChart(history) {
            if (!mvrvState.chart) return;

            const mvrvData = [];
            const priceData = [];

            history.forEach(function(item) {
                var time = item.date;
                mvrvData.push({ time: time, value: item.mvrv });
                if (item.price) {
                    priceData.push({ time: time, value: item.price });
                }
            });

            mvrvState.mvrvSeries.setData(mvrvData);
            mvrvState.priceSeries.setData(priceData);

            if (history.length >= 2) {
                var firstTime = history[0].date;
                var lastTime = history[history.length - 1].date;
                mvrvState.hline1.setData([
                    { time: firstTime, value: 1.0 },
                    { time: lastTime, value: 1.0 }
                ]);
                mvrvState.hline3.setData([
                    { time: firstTime, value: 3.0 },
                    { time: lastTime, value: 3.0 }
                ]);
            }

            mvrvState.chart.timeScale().fitContent();
        }

        function fetchMvrvData() {
            var now = Date.now();
            if (now - mvrvState.lastFetchTime < 5000) return;
            mvrvState.lastFetchTime = now;

            mvrvLoading.style.display = 'block';
            if (refreshMvrvBtn) {
                refreshMvrvBtn.classList.add('loading');
                refreshMvrvBtn.disabled = true;
            }

            fetch('/get_mvrv')
                .then(function(response) {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.json();
                })
                .then(function(data) {
                    mvrvLoading.style.display = 'none';
                    if (refreshMvrvBtn) {
                        refreshMvrvBtn.classList.remove('loading');
                        refreshMvrvBtn.disabled = false;
                    }

                    if (data.success) {
                        updateMvrvCards(data.current);
                        initMvrvChart();
                        updateMvrvChart(data.history);
                        mvrvState.loaded = true;
                    } else {
                        console.error('MVRV 数据获取失败:', data.error);
                    }
                })
                .catch(function(error) {
                    mvrvLoading.style.display = 'none';
                    if (refreshMvrvBtn) {
                        refreshMvrvBtn.classList.remove('loading');
                        refreshMvrvBtn.disabled = false;
                    }
                    console.error('MVRV 请求出错:', error);
                });
        }

        if (refreshMvrvBtn) {
            refreshMvrvBtn.addEventListener('click', function() {
                mvrvState.lastFetchTime = 0;
                fetchMvrvData();
            });
        }

        window.addEventListener('resize', debounce(resizeMvrvChart, 200));

        if (window.location.hash === '#mvrv') {
            setTimeout(fetchMvrvData, 600);
        }
    });
</script>
